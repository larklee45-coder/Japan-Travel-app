                var html_7fea1d2ecdd662f108aea7a8d62b8285 = $(`<div id="html_7fea1d2ecdd662f108aea7a8d62b8285" style="width: 100.0%; height: 100.0%;"><b>Himeji Castle</b><br>Built in the beginning of the 17th century when Japan's unique castle architectural techniques had reached their peak, Himeji Castle was the first in Japan to be registered as a UNESCO Cultural World Heritage in 1993 as well as designated as a National Treasure in 1951. It is called "Hakuro-jo" (White Heron Castle) because of its brilliant white exterior and supposed resemblance to a white heron taking flight. Q1. Can I use a credit card? A1. Yes, you can. We accept major credit cards like VISA, MasterCard, AMEX, Diners and JCB. Q2. Do you have a coin operated locker? A2. Yes we do, but the number and kind of them are limited, so you had better use the ones in Himeji station. The biggest size is 1135H x 350W x 640D(mm). Q3. When is peak season? A3. Our peak is usually around late March to early April for cherry blossoms, late April to early May for Japanese Holiday Season so called 'Golden Week', and October and November for travel season for Japanese. Q4. When do I have to arrive to avoid congestion? A4. 15 to 30 minutes prior to opening time (9am (8am-8:30am for peak season)). Q5. How long does it take to walk around the castle? A5. Normally, it takes at least 90 minutes to explore the castle, but you can try to go up and down with no stop in 45 minutes.</div>`)[0];
